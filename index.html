<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>OfficialGF Tokyo Scene Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #161616;
      --muted: #6b6b6b;
      --yellow: #ffe066;
      --red: #ff4d5a;
      --silver: #d7d7d7;
      --blue: #6bbcff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    * { box-sizing: border-box; }

    .scene-map {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .map-shell {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
    }

    .map-panel,
    .info-panel {
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(215,215,215,.72));
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 10px 40px rgba(0,0,0,.18),
        inset 0 1px 0 rgba(255,255,255,.7);
    }

    .map-panel::before,
    .info-panel::before {
      content: "★ ✦ ★";
      position: absolute;
      top: 14px;
      right: 18px;
      color: var(--red);
      font-size: 18px;
      letter-spacing: 6px;
      opacity: .85;
      pointer-events: none;
      text-shadow:
        0 0 8px rgba(255,224,102,.8),
        0 0 16px rgba(107,188,255,.45);
    }

    .map-header {
      padding: 22px 22px 10px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 6px;
      font-weight: 700;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-family: 'Audiowide', sans-serif;
      font-size: clamp(24px, 3.4vw, 42px);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: .01em;
      color: white;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow:
        0 0 6px rgba(255,255,255,.9),
        0 0 12px rgba(107,188,255,.8),
        0 0 20px rgba(255,77,90,.65),
        3px 3px 0 rgba(255,224,102,.55);
    }

    .intro {
      color: #111;
      font-size: 14px;
      line-height: 1.5;
      max-width: 720px;
      margin-bottom: 0;
    }

    .tokyo-map {
      position: relative;
      height: 520px;
      margin: 12px 18px 18px;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
        radial-gradient(circle at 26% 35%, rgba(255,224,102,.16), transparent 20%),
        radial-gradient(circle at 60% 42%, rgba(107,188,255,.16), transparent 22%),
        radial-gradient(circle at 48% 66%, rgba(255,77,90,.13), transparent 24%),
        linear-gradient(135deg, #111827, #171124, #221933);
      background-size:
        38px 38px,
        38px 38px,
        auto,
        auto,
        auto,
        auto;
      border: 1px solid rgba(255,255,255,.08);
    }

    .star {
      position: absolute;
      color: var(--silver);
      font-size: 20px;
      opacity: .9;
      animation: twinkle 3s infinite ease-in-out;
      pointer-events: none;
      text-shadow:
        0 0 6px rgba(255,255,255,.8),
        0 0 16px rgba(107,188,255,.45);
    }

    .star.s1 { left: 10%; top: 21%; }
    .star.s2 { left: 73%; top: 19%; animation-delay: .5s; }
    .star.s3 { left: 83%; top: 71%; animation-delay: 1s; }
    .star.s4 { left: 15%; top: 82%; animation-delay: 1.4s; }
    .star.s6 { left: 60%; top: 86%; animation-delay: 1.8s; color: var(--blue); }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(1) rotate(0deg);
        opacity: .55;
      }

      50% {
        transform: scale(1.35) rotate(12deg);
        opacity: 1;
      }
    }

    .map-label {
      position: absolute;
      font-size: 11px;
      letter-spacing: .08em;
      color: rgba(255,255,255,.38);
      text-transform: uppercase;
      pointer-events: none;
      font-weight: 700;
      white-space: nowrap;
    }

    .label-west {
      left: 71%;
      top: 44%;
    }

    .label-central {
      left: 13%;
      top: 18%;
    }

    .label-south {
      left: 41%;
      top: 74%;
    }

    .label-east {
      left: 74%;
      top: 58%;
    }

    .pin {
      position: absolute;
      transform: translate(-50%, -50%);
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      text-align: center;
      color: var(--text);
    }

    .pin-dot {
      display: block;
      margin: 0 auto 8px;
      font-size: 34px;
      line-height: 1;
      color: var(--yellow);
      text-shadow:
        0 0 8px rgba(255,224,102,.85),
        0 0 18px rgba(255,77,90,.45),
        0 0 28px rgba(107,188,255,.4);
      transition:
        transform .18s ease,
        text-shadow .18s ease;
    }

    .pin-name {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(215,215,215,.82));
      border: 1px solid rgba(255,255,255,.15);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      color: #111;
      box-shadow:
        0 4px 14px rgba(0,0,0,.2),
        inset 0 1px 0 rgba(255,255,255,.8);
    }

    .pin:hover .pin-dot,
    .pin.active .pin-dot {
      transform: scale(1.32) rotate(14deg);
    }

    .pin.active .pin-name {
      background: linear-gradient(90deg, var(--yellow), var(--red), var(--blue));
      color: #111;
    }

    .info-panel {
      padding: 24px;
      min-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .tag {
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(215,215,215,.78));
      font-weight: 700;
    }

    .info-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 34px;
      line-height: .95;
      margin-bottom: 8px;
      color: #1b1028;
    }

    .area {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
      font-weight: 700;
    }

    .description {
      line-height: 1.55;
      font-size: 15px;
      color: #222;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 8px;
      font-weight: 800;
    }

    .venue-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .venue-card {
      border-radius: 16px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.88), rgba(215,215,215,.72));
    }

    .venue-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .venue-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      display: block;
    }

    @media (max-width: 850px) {
      .map-shell {
        grid-template-columns: 1fr;
      }

      .tokyo-map {
        height: 430px;
      }

      .venue-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="scene-map">
    <div class="map-shell">

      <section class="map-panel">
        <div class="map-header">
          <p class="eyebrow">OfficialGF field notes</p>

          <h1>Tokyo Scene Map</h1>

          <p class="intro">
            Click a star to explore indie pockets, DIY venues,
            and live-house routes around Tokyo.
          </p>
        </div>

        <div class="tokyo-map" id="tokyoMap">

          <span class="map-label label-west">
            clubs and parties
          </span>

          <span class="map-label label-central">
            DIY/punk scene
          </span>

          <span class="map-label label-south">
            heart of the live scene
          </span>

          <span class="star s1">✦</span>
          <span class="star s2">✧</span>
          <span class="star s3">✦</span>
          <span class="star s4">✧</span>
          <span class="star s6">✧</span>

        </div>
      </section>

      <aside class="info-panel" id="infoPanel"></aside>

    </div>
  </main>

  <script>
    const places = [

      {
        id: "shimokitazawa",
        name: "Shimokitazawa",
        area: "Indie bands, small venues, record shops",
        x: 30,
        y: 64,
        tags: ["indie", "live houses", "records"],
        description:
          "Tokyo’s most iconic indie neighborhood.",
        venues: [
          ["BASEMENTBAR", "Established indie venue."],
          ["RETRONYM", "Modern venue with larger stage."]
        ]
      },

      {
        id: "shibuya",
        name: "Shibuya",
        area: "International-friendly music spaces",
        x: 56,
        y: 60,
        tags: ["international", "open mic", "central"],
        description:
          "Late-night energy and easy venue access.",
        venues: [
          ["RUBY ROOM", "Open mic and community feel."],
          ["WWW", "Larger indie bookings."]
        ]
      },

      {
        id: "roppongi",
        name: "Roppongi",
        area: "Clubs, DJs, nightlife, international crowds",
        x: 67,
        y: 57,
        tags: ["clubs", "late night", "international"],
        description:
          "Roppongi is centered around nightlife, DJs, and international club culture.",
        venues: [
          ["CUBE", "Electronic nights and creative parties."],
          ["V2 TOKYO", "Large-scale nightlife energy."],
          ["Abbey Road", "Classic rock live music venue."],
          ["SuperDeluxe", "Experimental music legacy."]
        ]
      },

      {
        id: "asagaya",
        name: "Asagaya",
        area: "DIY pockets and community bars",
        x: 37,
        y: 34,
        tags: ["DIY", "community"],
        description:
          "Personal, community-driven music spaces.",
        venues: [
          ["GAMUSO", "DIY and mixed events."],
          ["Yellow Vision", "Experimental and jazz."]
        ]
      },

      {
        id: "koenji",
        name: "Koenji",
        area: "Punk and underground culture",
        x: 27,
        y: 37,
        tags: ["punk", "underground"],
        description:
          "Punk, thrift culture, and underground music.",
        venues: [
          ["U.F.O CLUB", "Garage and punk."],
          ["HIGH", "Alternative programming."]
        ]
      },

      {
  id: "shinjuku",
  name: "Shinjuku",
  area: "Dense nightlife, legacy venues, chaotic Tokyo energy",
  x: 48,
  y: 39,
  tags: ["nightlife", "rock", "live houses"],
  description:
    "Shinjuku is loud, dense, chaotic, and full of long-running live houses. Good for heavier nightlife energy and discovering multiple scenes in one night.",
  venues: [
    ["LOFT", "Historic live house with deep Tokyo music history."],
    ["MARZ", "Alternative and indie-focused bookings."],
    ["WildSide Tokyo", "Rock, punk, metal, and loud bands."],
    ["Antiknock", "Underground punk and heavier music lineage."]
  ]
}

    ];

    const map = document.getElementById("tokyoMap");
    const panel = document.getElementById("infoPanel");

    function renderPins() {
      places.forEach((place) => {

        const button = document.createElement("button");

        button.className = "pin";
        button.style.left = place.x + "%";
        button.style.top = place.y + "%";

        button.innerHTML = `
          <span class="pin-dot">★</span>
          <span class="pin-name">${place.name}</span>
        `;

        button.addEventListener("click", () => {
          selectPlace(place.id);
        });

        map.appendChild(button);
      });
    }

    function selectPlace(id) {

      const place = places.find((item) => item.id === id);

      document.querySelectorAll(".pin").forEach((pin) => {
        pin.classList.remove("active");
      });

      const activePin = [...document.querySelectorAll(".pin")]
        .find(pin => pin.innerText.includes(place.name));

      if (activePin) {
        activePin.classList.add("active");
      }

      const tags = place.tags.map(tag =>
        `<span class="tag">${tag}</span>`
      ).join("");

      const venues = place.venues.map(([name, note]) => `
        <div class="venue-card">
          <strong>${name}</strong>
          <span>${note}</span>
        </div>
      `).join("");

      panel.innerHTML = `
        <p class="eyebrow">Tokyo scene pin ★</p>

        <h2 class="info-title">${place.name}</h2>

        <p class="area">${place.area}</p>

        <p class="description">
          ${place.description}
        </p>

        <div class="tag-row">
          ${tags}
        </div>

        <p class="section-title">
          Venues / reference points
        </p>

        <div class="venue-list">
          ${venues}
        </div>
      `;
    }

    renderPins();
    selectPlace("roppongi");
  </script>
</body>
</html>
