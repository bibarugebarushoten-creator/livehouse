<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OfficialGF Tokyo Scene Map</title>
  <style>
    :root {
      --text: #1b1028;
      --muted: #735f86;
      --line: rgba(90, 43, 130, .22);
      --paper: rgba(255,255,255,.82);
      --pink: #ff8bd8;
      --blue: #8be7ff;
      --yellow: #fff3a8;
      --purple: #caa7ff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    * { box-sizing: border-box; }

    .scene-map {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
      background: transparent;
    }

    .map-shell {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
    }

    .map-panel,
    .info-panel {
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,240,252,.82));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(120, 69, 180, .16);
      overflow: hidden;
      position: relative;
    }

    .map-panel::before,
    .info-panel::before {
      content: "✦ ✧ ✦";
      position: absolute;
      top: 14px;
      right: 18px;
      color: var(--pink);
      font-size: 18px;
      letter-spacing: 6px;
      opacity: .8;
      pointer-events: none;
    }

    .map-header {
      padding: 20px 20px 8px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 6px;
      font-weight: 700;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(30px, 4vw, 52px);
      line-height: .9;
      margin-bottom: 10px;
      letter-spacing: -0.06em;
      text-shadow: 2px 2px 0 var(--blue), 4px 4px 0 rgba(255,139,216,.45);
    }

    .intro {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      max-width: 720px;
      margin-bottom: 0;
    }

    .tokyo-map {
      position: relative;
      height: 520px;
      margin: 12px 18px 18px;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,139,216,.45), transparent 16%),
        radial-gradient(circle at 72% 28%, rgba(139,231,255,.42), transparent 18%),
        radial-gradient(circle at 52% 72%, rgba(255,243,168,.45), transparent 18%),
        linear-gradient(90deg, rgba(120,69,180,.10) 1px, transparent 1px),
        linear-gradient(rgba(120,69,180,.10) 1px, transparent 1px),
        rgba(255,255,255,.55);
      background-size: auto, auto, auto, 38px 38px, 38px 38px, auto;
      border: 1px solid var(--line);
    }

    .star {
      position: absolute;
      color: #ff6fd8;
      font-size: 18px;
      opacity: .9;
      animation: twinkle 2.8s infinite ease-in-out;
      pointer-events: none;
    }

    .star.s1 { left: 12%; top: 18%; }
    .star.s2 { left: 70%; top: 16%; animation-delay: .5s; }
    .star.s3 { left: 82%; top: 68%; animation-delay: 1s; }
    .star.s4 { left: 17%; top: 78%; animation-delay: 1.4s; }
    .star.s5 { left: 48%; top: 31%; animation-delay: .8s; color: #8be7ff; }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: .55; }
      50% { transform: scale(1.35); opacity: 1; }
    }

    .route {
      position: absolute;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--blue));
      transform-origin: left center;
      pointer-events: none;
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(255,139,216,.45);
    }

    .route.r1 { width: 230px; left: 22%; top: 40%; transform: rotate(14deg); }
    .route.r2 { width: 210px; left: 28%; top: 52%; transform: rotate(-18deg); }
    .route.r3 { width: 170px; left: 24%; top: 63%; transform: rotate(20deg); }

    .map-label {
      position: absolute;
      font-size: 11px;
      letter-spacing: .08em;
      color: rgba(74, 36, 110, .52);
      text-transform: uppercase;
      pointer-events: none;
      font-weight: 700;
    }

    .label-west { left: 7%; top: 12%; }
    .label-central { left: 50%; top: 18%; }
    .label-south { left: 53%; bottom: 9%; }

    .pin {
      position: absolute;
      transform: translate(-50%, -50%);
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      text-align: center;
      color: var(--text);
    }

    .pin-dot {
      width: 24px;
      height: 24px;
      display: block;
      margin: 0 auto 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff, var(--pink) 38%, #7c3cff 100%);
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(124,60,255,.35), 0 0 18px rgba(255,139,216,.7);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .pin-name {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(124,60,255,.22);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 5px 12px rgba(120,69,180,.12);
    }

    .pin:hover .pin-dot,
    .pin.active .pin-dot {
      transform: scale(1.28) rotate(8deg);
      box-shadow: 0 0 0 5px rgba(255,139,216,.25), 0 0 24px rgba(139,231,255,.9);
    }

    .pin.active .pin-name {
      background: linear-gradient(90deg, var(--pink), var(--blue));
      color: #1b1028;
    }

    .info-panel {
      padding: 24px;
      min-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .tag {
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(255,255,255,.68);
      box-shadow: inset 0 -4px 0 rgba(255,139,216,.18);
    }

    .info-title {
      font-size: 34px;
      line-height: .95;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 rgba(139,231,255,.65);
    }

    .area {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
      font-weight: 700;
    }

    .description {
      line-height: 1.55;
      font-size: 15px;
      color: #2a173a;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 8px;
      font-weight: 800;
    }

    .button-row {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 22px;
    }

    .map-button {
      display: inline-block;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid #7c3cff;
      color: #1b1028;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255,255,255,.72);
    }

    .map-button.primary {
      background: linear-gradient(90deg, var(--pink), var(--blue));
      color: #1b1028;
    }

    .venue-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .venue-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 5px 14px rgba(120,69,180,.08);
    }

    .venue-card strong { display: block; margin-bottom: 4px; }
    .venue-card span { color: var(--muted); font-size: 12px; line-height: 1.35; display: block; }

    @media (max-width: 850px) {
      .map-shell { grid-template-columns: 1fr; }
      .tokyo-map { height: 430px; }
      .info-panel { min-height: auto; }
      .venue-list { grid-template-columns: 1fr; }
      .pin-name { font-size: 11px; }
    }
  </style>
</head>
<body>
  <main class="scene-map" aria-label="Interactive Tokyo music scene map">
    <div class="map-shell">
      <section class="map-panel">
        <div class="map-header">
          <p class="eyebrow">OfficialGF field notes</p>
          <h1>Tokyo Scene Map</h1>
          <p class="intro">Click a neighborhood to explore indie pockets, DIY venues, and live-house routes around Tokyo.</p>
        </div>

        <div class="tokyo-map" id="tokyoMap">
          <span class="map-label label-west">west side / diy routes</span>
          <span class="map-label label-central">central tokyo</span>
          <span class="map-label label-south">late night trains</span>

          <span class="star s1">✦</span>
          <span class="star s2">✧</span>
          <span class="star s3">✦</span>
          <span class="star s4">✧</span>
          <span class="star s5">★</span>

          <span class="route r1"></span>
          <span class="route r2"></span>
          <span class="route r3"></span>
        </div>
      </section>

      <aside class="info-panel" id="infoPanel"></aside>
    </div>
  </main>

  <script>
    const places = [
      {
        id: "shimokitazawa",
        name: "Shimokitazawa",
        area: "Indie bands, small venues, record shops, night wandering",
        x: 32,
        y: 58,
        tags: ["indie", "live houses", "record stores"],
        description: "Shimokitazawa is the obvious starting point for Tokyo indie discovery: walkable, venue-dense, and easy to turn into a night of small-stage hopping.",
        venues: [
          ["BASEMENTBAR", "Strong sound, established live-house feel, good for band discovery."],
          ["RETRONYM", "Newer-feeling space with a bigger stage, couches, and a central Shimokita location."],
          ["SHELTER", "Classic Shimokitazawa live-house name for guitar music history."],
          ["THREE", "Underground-leaning indie and alternative shows."]
        ],
        links: [
          ["Read the Shimokitazawa guide", "#"],
          ["Browse live reports", "#"]
        ]
      },
      {
        id: "shibuya",
        name: "Shibuya",
        area: "International-friendly jams, open mics, bigger city energy",
        x: 52,
        y: 52,
        tags: ["open mic", "international", "central"],
        description: "Shibuya works well as an entry point for visitors because it has internationally friendly spaces, late-night energy, and easy transit connections.",
        venues: [
          ["RUBY ROOM", "Friendly staff, open mic Tuesdays, good for international musicians."],
          ["WWW / WWW X", "Larger shows, indie-adjacent bookings, strong discovery potential."],
          ["O-nest", "Long-running Shibuya live-house ecosystem."],
          ["Club Quattro", "Bigger club shows and touring acts."]
        ],
        links: [
          ["How to perform in Tokyo", "#"],
          ["Tokyo live house basics", "#"]
        ]
      },
      {
        id: "asagaya",
        name: "Asagaya",
        area: "DIY pockets, community bars, intimate shows",
        x: 24,
        y: 40,
        tags: ["DIY", "community", "small rooms"],
        description: "Asagaya is a good pin for the scrappier, community-run side of Tokyo music: less polished, more personal, and often easier to talk to people.",
        venues: [
          ["GAMUSO", "DIY feel, community-run energy, food/drinks, mixed events."],
          ["Loft A", "Talk events, music-adjacent culture, subculture programming."],
          ["Yellow Vision", "Small-room experimental and jazz-adjacent events."],
          ["MANHOLE Next", "Local underground event feel."]
        ],
        links: [
          ["DIY Tokyo music notes", "#"],
          ["International indie scene", "#"]
        ]
      },
      {
        id: "koenji",
        name: "Koenji",
        area: "Punk, used clothes, underground culture",
        x: 29,
        y: 31,
        tags: ["punk", "subculture", "underground"],
        description: "Koenji is useful for punk, noise, thrift culture, and less glossy Tokyo music routes. It feels more like a neighborhood than a tourist image.",
        venues: [
          ["U.F.O. CLUB", "Garage, psych, punk, and underground bookings."],
          ["HIGH", "Broad indie and alternative live-house programming."],
          ["JIROKICHI", "Historic room with rootsy and jazz-adjacent shows."],
          ["ShowBoat", "Long-running rock venue energy."]
        ],
        links: [
          ["Koenji scene guide", "#"],
          ["Underground Japan posts", "#"]
        ]
      }
    ];

    const map = document.getElementById("tokyoMap");
    const panel = document.getElementById("infoPanel");

    function renderPins() {
      places.forEach((place) => {
        const button = document.createElement("button");
        button.className = "pin";
        button.style.left = place.x + "%";
        button.style.top = place.y + "%";
        button.setAttribute("aria-label", "Open " + place.name);
        button.innerHTML = `<span class="pin-dot"></span><span class="pin-name">${place.name}</span>`;
        button.addEventListener("click", () => selectPlace(place.id));
        map.appendChild(button);
      });
    }

    function selectPlace(id) {
      const place = places.find((item) => item.id === id);
      if (!place) return;

      document.querySelectorAll(".pin").forEach((pin) => {
        pin.classList.toggle("active", pin.getAttribute("aria-label") === "Open " + place.name);
      });

      const tags = place.tags.map((tag) => `<span class="tag">${tag}</span>`).join("");
      const venues = place.venues.map(([name, note]) => `
        <div class="venue-card">
          <strong>${name}</strong>
          <span>${note}</span>
        </div>
      `).join("");
      const links = place.links.map(([label, href], index) => `
        <a class="map-button ${index === 0 ? "primary" : ""}" href="${href}" target="_top">${label}</a>
      `).join("");

      panel.innerHTML = `
        <p class="eyebrow">Tokyo scene pin ✦</p>
        <h2 class="info-title">${place.name}</h2>
        <p class="area">${place.area}</p>
        <p class="description">${place.description}</p>
        <div class="tag-row">${tags}</div>
        <p class="section-title">Venues / reference points</p>
        <div class="venue-list">${venues}</div>
        <div class="button-row">${links}</div>
      `;
    }

    renderPins();
    selectPlace("shimokitazawa");
  </script>
</body>
</html>
